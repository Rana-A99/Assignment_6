name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/**

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run linter
        run: |
          echo "Running linter..."
          pip install flake8
          flake8 .

  train:
    runs-on: ubuntu-latest
    needs: linter

    if: |
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run training
        run: |
          echo "Training model..."
          exit 1

      - name: Save error logs
        if: failure()
        run: |
          echo "Training failed" > error_logs.txt

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup resources
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."